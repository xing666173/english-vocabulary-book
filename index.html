<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词积累本</title>
    <style>
        /* ================= 基础变量与重置 (Claude 风格) ================= */
        :root {
            --bg-color: #f9f8f6;
            --card-bg: #ffffff;
            --text-main: #2d2d2d;
            --text-muted: #737373;
            --primary-color: #2d2d2d;
            --primary-hover: #1a1a1a;
            --border-color: #e5e5e5;
            --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.02);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.08);
            --border-radius: 12px;
            --transition-speed: 0.2s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ================= 布局组件 ================= */
        .header {
            background-color: var(--bg-color);
            padding: 1.5rem 2rem;
            box-shadow: none;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header h1 {
            font-size: 1.25rem;
            color: var(--text-main);
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2.5rem 1rem;
        }

        /* ================= 控制区 ================= */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2.5rem;
            align-items: center;
            justify-content: space-between;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1.2rem;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            color: var(--text-main);
            outline: none;
            transition: all var(--transition-speed) ease;
            box-shadow: var(--shadow-sm);
        }

        .search-box input:focus {
            border-color: #a3a3a3;
            box-shadow: 0 0 0 3px rgba(45, 45, 45, 0.05);
        }

        .search-box input::placeholder {
            color: #a3a3a3;
        }

        .action-buttons {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        /* ================= 按钮样式 ================= */
        .btn {
            padding: 0.65rem 1.25rem;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-main);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all var(--transition-speed) ease;
            display: inline-block;
            box-shadow: var(--shadow-sm);
        }

        .btn:hover {
            background-color: #f5f5f5;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: #ffffff;
            border-color: var(--primary-color);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        }

        /* ================= 可访问性与辅助样式 ================= */
        .file-upload-input {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .required-mark {
            color: #c84b31;
            margin-left: 4px;
        }

        /* ================= 单词列表区 ================= */
        .word-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .word-card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 1.8rem;
            border: none;
            box-shadow: var(--shadow-md);
            transition: box-shadow var(--transition-speed), transform var(--transition-speed);
        }

        .word-card:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            transform: translateY(-2px);
        }

        .word-card-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.8rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            padding-bottom: 0.8rem;
        }

        .word-card-word {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.02em;
        }

        .word-card-phonetic {
            font-size: 0.9rem;
            color: #a3a3a3;
            font-family: "Lucida Sans Unicode", sans-serif;
            margin-left: 0.5rem;
        }

        .word-card-pos {
            display: inline-block;
            background-color: #f4f4f4;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.8rem;
        }

        .word-card-translation {
            font-size: 1.05rem;
            margin-bottom: 0.8rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .word-card-usage {
            font-size: 0.9rem;
            color: var(--text-muted);
            background-color: var(--bg-color);
            padding: 0.75rem;
            border-radius: 6px;
            border-left: 3px solid #d4d4d4;
            line-height: 1.5;
        }

        /* ================= 弹窗 (Modal) ================= */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--card-bg);
            width: 90%;
            max-width: 480px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            animation: modalFadeIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal-header {
            padding: 1.5rem 1.8rem 1rem;
            border-bottom: none;
        }

        .modal-header h2 {
            font-size: 1.25rem;
            color: var(--text-main);
            font-weight: 600;
        }

        .modal-body {
            padding: 0 1.8rem 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--text-main);
            background-color: #fafafa;
            outline: none;
            transition: all var(--transition-speed) ease;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            background-color: #ffffff;
            border-color: #a3a3a3;
            box-shadow: 0 0 0 3px rgba(45, 45, 45, 0.05);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 90px;
        }

        .modal-footer {
            padding: 1rem 1.8rem 1.5rem;
            border-top: none;
            display: flex;
            justify-content: flex-end;
            gap: 0.8rem;
        }

        /* ================= 侧边字母表样式与布局重构 ================= */
        .layout-wrapper {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
        }

        .main-content {
            flex: 1;
            min-width: 0;
        }

        .alphabet-sidebar {
            width: 48px;
            position: sticky;
            top: 100px;
            background-color: var(--card-bg);
            border-radius: 100px;
            padding: 1rem 0;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .alpha-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-speed) ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .alpha-btn:not(.disabled):hover {
            background-color: #f0f0f0;
            color: var(--text-main);
        }

        .alpha-btn.active {
            background-color: var(--primary-color);
            color: #ffffff;
            box-shadow: var(--shadow-sm);
        }

        .alpha-btn.disabled {
            opacity: 0.25;
            cursor: not-allowed;
        }

        .alpha-btn.all-btn {
            font-size: 0.7rem;
            width: 36px;
            border-radius: 12px;
            margin-bottom: 0.5rem;
        }

        /* ================= 移动端适配 ================= */
        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            .action-buttons {
                justify-content: space-between;
            }
            .action-buttons .btn,
            .action-buttons label {
                flex: 1;
                text-align: center;
            }
            .layout-wrapper {
                flex-direction: column;
            }
            .alphabet-sidebar {
                width: 100%;
                position: static;
                flex-direction: row;
                overflow-x: auto;
                padding: 10px;
                border-radius: 12px;
                margin-bottom: 1rem;
            }
            .alpha-btn {
                flex-shrink: 0;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>单词积累本</h1>
    </header>

    <main class="container layout-wrapper">
        <div class="main-content">
            <div class="controls">
                <div class="search-box">
                    <input type="text" id="searchInput" aria-label="搜索单词" placeholder="搜索单词、翻译或拼写...">
                </div>
                <div class="action-buttons">
                    <button type="button" id="btnAddWord" class="btn btn-primary">添加单词</button>
                    <button type="button" id="btnExportData" class="btn">导出数据</button>
                    <label for="importFile" class="btn">导入数据</label>
                    <input type="file" id="importFile" class="file-upload-input" accept=".json">
                </div>
            </div>

            <div id="wordList" class="word-list">
            </div>
        </div>

        <aside class="alphabet-sidebar" aria-label="字母导航">
            <div id="alphabetList" style="display: contents;">
            </div>
        </aside>
    </main>

    <div id="wordModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">添加单词</h2>
            </div>
            <div class="modal-body">
                <form id="wordForm">
                    <input type="hidden" id="wordId">
                    <div class="form-group">
                        <label for="wordInput">单词 <span class="required-mark">*</span></label>
                        <input type="text" id="wordInput" required placeholder="例如: Apple">
                    </div>
                    <div class="form-group">
                        <label for="phoneticInput">音标</label>
                        <input type="text" id="phoneticInput" placeholder="例如: /ˈæp.əl/">
                    </div>
                    <div class="form-group">
                        <label for="posInput">词性</label>
                        <input type="text" id="posInput" placeholder="例如: n. / adj. / v.">
                    </div>
                    <div class="form-group">
                        <label for="translationInput">中文翻译</label>
                        <input type="text" id="translationInput" placeholder="例如: 苹果">
                    </div>
                    <div class="form-group">
                        <label for="usageInput">例句或用法说明</label>
                        <textarea id="usageInput" placeholder="输入例句或短语搭配..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" id="btnCancelModal" class="btn">取消</button>
                <button type="submit" form="wordForm" id="btnSaveWord" class="btn btn-primary">保存</button>
            </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // ================= 1. DOM 节点获取 =================
        const wordListEl = document.getElementById('wordList');
        const btnAddWord = document.getElementById('btnAddWord');
        const wordModal = document.getElementById('wordModal');
        const btnCancelModal = document.getElementById('btnCancelModal');
        const wordForm = document.getElementById('wordForm');
        
        const searchInput = document.getElementById('searchInput');
        const btnExportData = document.getElementById('btnExportData');
        const importFile = document.getElementById('importFile');
        const alphabetListEl = document.getElementById('alphabetList');

        // ================= 2. 状态管理 =================
        let vocabulary = JSON.parse(localStorage.getItem('my_vocabulary')) || [];
        let currentLetterFilter = 'All';

        // ================= 3. 基础工具函数 =================
        const escapeHTML = (str) => {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        };

        const saveToLocal = () => {
            localStorage.setItem('my_vocabulary', JSON.stringify(vocabulary));
            renderAlphabetIndex(); 
        };

        // ================= 4. 视图渲染逻辑 =================
        
        const renderList = (dataToRender = vocabulary) => {
            wordListEl.innerHTML = '';

            // 【优化】：空状态 (Empty State) 拦截渲染
            if (dataToRender.length === 0) {
                wordListEl.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 4rem 1rem; color: var(--text-muted);">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom: 1rem; opacity: 0.5; display: inline-block;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" />
                        </svg>
                        <p style="font-size: 1.1rem; font-weight: 500; color: var(--text-main);">未找到匹配的单词</p>
                        <p style="font-size: 0.9rem; margin-top: 0.5rem;">请尝试更换搜索词，或点击上方按钮添加新单词。</p>
                    </div>
                `;
                return;
            }

            const sortedVocab = [...dataToRender].sort((a, b) => 
                a.word.toLowerCase().localeCompare(b.word.toLowerCase())
            );

            sortedVocab.forEach(item => {
                const card = document.createElement('div');
                card.className = 'word-card';
                
                let cardHTML = `
                    <div class="word-card-header">
                        <div>
                            <span class="word-card-word">${escapeHTML(item.word)}</span>
                            <span class="word-card-phonetic">${escapeHTML(item.phonetic)}</span>
                        </div>
                        <div style="display:flex; gap:0.5rem;">
                            <button class="btn-edit" style="background:none; border:none; color:var(--primary-color); cursor:pointer; font-size: 0.9rem;">编辑</button>
                            <button class="btn-delete" style="background:none; border:none; color:#c84b31; cursor:pointer; font-size: 0.9rem;">删除</button>
                        </div>
                    </div>
                `;
                
                if (item.partOfSpeech) cardHTML += `<div class="word-card-pos">${escapeHTML(item.partOfSpeech)}</div>`;
                if (item.translation) cardHTML += `<div class="word-card-translation">${escapeHTML(item.translation)}</div>`;
                if (item.usage) cardHTML += `<div class="word-card-usage">${escapeHTML(item.usage)}</div>`;

                card.innerHTML = cardHTML;

                card.querySelector('.btn-edit').addEventListener('click', () => editWord(item.id));
                card.querySelector('.btn-delete').addEventListener('click', () => deleteWord(item.id));

                wordListEl.appendChild(card);
            });
        };

        const renderAlphabetIndex = () => {
            alphabetListEl.innerHTML = '';
            
            const existingLetters = new Set(vocabulary.map(v => v.word.charAt(0).toUpperCase()));

            const btnAll = document.createElement('button');
            btnAll.className = `alpha-btn all-btn ${currentLetterFilter === 'All' ? 'active' : ''}`;
            btnAll.textContent = 'ALL';
            btnAll.addEventListener('click', () => {
                currentLetterFilter = 'All';
                handleSearch(); 
                renderAlphabetIndex(); 
            });
            alphabetListEl.appendChild(btnAll);

            for (let i = 65; i <= 90; i++) {
                const letter = String.fromCharCode(i);
                const hasWords = existingLetters.has(letter);
                const isActive = currentLetterFilter === letter;

                const btn = document.createElement('button');
                btn.className = `alpha-btn ${!hasWords ? 'disabled' : ''} ${isActive ? 'active' : ''}`;
                btn.textContent = letter;

                if (hasWords) {
                    btn.addEventListener('click', () => {
                        currentLetterFilter = letter;
                        handleSearch();
                        renderAlphabetIndex();
                    });
                }
                alphabetListEl.appendChild(btn);
            }
        };

        // ================= 5. 交互与增删改查逻辑 =================

        const handleSearch = () => {
            const keyword = searchInput.value.trim().toLowerCase();
            let filteredData = vocabulary;

            // 1. 字母过滤
            if (currentLetterFilter !== 'All') {
                filteredData = filteredData.filter(item => 
                    item.word.charAt(0).toUpperCase() === currentLetterFilter
                );
            }

            // 2. 关键字搜索过滤
            if (keyword) {
                filteredData = filteredData.filter(item => 
                    item.word.toLowerCase().includes(keyword) || 
                    (item.translation && item.translation.includes(keyword))
                );
            }

            renderList(filteredData);
        };
        searchInput.addEventListener('input', handleSearch);

        const deleteWord = (id) => {
            if (window.confirm('此操作不可逆，确定要删除这个单词吗？')) {
                vocabulary = vocabulary.filter(item => item.id !== id);
                saveToLocal();
                
                // 删除后如果该字母分类已空，重置回 All 状态
                const existingLetters = new Set(vocabulary.map(v => v.word.charAt(0).toUpperCase()));
                if (currentLetterFilter !== 'All' && !existingLetters.has(currentLetterFilter)) {
                    currentLetterFilter = 'All';
                }
                handleSearch(); 
            }
        };

        const openModal = () => {
            document.getElementById('modalTitle').textContent = '添加单词';
            wordModal.classList.add('active');
        };
        
        const closeModal = () => {
            wordModal.classList.remove('active');
            wordForm.reset(); 
            document.getElementById('wordId').value = ''; 
        };
        
        const editWord = (id) => {
            const item = vocabulary.find(v => v.id === id);
            if (!item) return;
            document.getElementById('wordId').value = item.id;
            document.getElementById('wordInput').value = item.word;
            document.getElementById('phoneticInput').value = item.phonetic || '';
            document.getElementById('posInput').value = item.partOfSpeech || '';
            document.getElementById('translationInput').value = item.translation || '';
            document.getElementById('usageInput').value = item.usage || '';
            document.getElementById('modalTitle').textContent = '编辑单词';
            wordModal.classList.add('active');
        };

        wordForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const wordInputValue = document.getElementById('wordInput').value.trim();
            
            // 正则校验防线：仅允许英文字母、空格和连字符
            const wordRegex = /^[A-Za-z\s\-]+$/;
            if (!wordRegex.test(wordInputValue)) {
                alert('添加失败：\n单词只能包含英文字母、空格或连字符（-）！\n严禁输入中文、数字或其他特殊符号。');
                return;
            }

            const editId = document.getElementById('wordId').value;
            const newWordData = {
                word: wordInputValue,
                phonetic: document.getElementById('phoneticInput').value.trim(),
                partOfSpeech: document.getElementById('posInput').value.trim(),
                translation: document.getElementById('translationInput').value.trim(),
                usage: document.getElementById('usageInput').value.trim(),
            };

            if (editId) {
                const index = vocabulary.findIndex(v => v.id === editId);
                if (index > -1) vocabulary[index] = { ...vocabulary[index], ...newWordData };
            } else {
                vocabulary.push({
                    id: Date.now().toString(),
                    timestamp: Date.now(),
                    ...newWordData
                });
            }

            saveToLocal();
            handleSearch(); 
            closeModal();
        });

        // ================= 6. 跨端同步 (导入/导出) =================
        
        btnExportData.addEventListener('click', () => {
            if (vocabulary.length === 0) return alert('存储库为空，没有可导出的数据！');
            const dataStr = JSON.stringify(vocabulary, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'my_vocabulary.json';
            document.body.appendChild(a); 
            a.click(); 
            document.body.removeChild(a); 
            URL.revokeObjectURL(url);
        });

        importFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const importedData = JSON.parse(event.target.result);
                    if (!Array.isArray(importedData)) throw new Error('非法格式：顶级结构必须是数组。');

                    let mergedCount = 0;
                    let updatedCount = 0;

                    importedData.forEach(newWord => {
                        if (!newWord.word) return;
                        const existingIndex = vocabulary.findIndex(v => 
                            v.id === newWord.id || 
                            v.word.toLowerCase() === newWord.word.toLowerCase()
                        );

                        if (existingIndex > -1) {
                            vocabulary[existingIndex] = { ...vocabulary[existingIndex], ...newWord, id: vocabulary[existingIndex].id };
                            updatedCount++;
                        } else {
                            if (!newWord.id) newWord.id = Date.now().toString() + Math.random().toString(36).substring(2);
                            if (!newWord.timestamp) newWord.timestamp = Date.now();
                            vocabulary.push(newWord);
                            mergedCount++;
                        }
                    });

                    saveToLocal();
                    handleSearch();
                    alert(`导入成功！\n- 新增单词: ${mergedCount} 个\n- 更新已有单词: ${updatedCount} 个`);
                } catch (error) { 
                    alert('解析失败，请检查文件是否损坏。\n系统错误：' + error.message); 
                } finally { 
                    e.target.value = ''; 
                }
            };
            reader.readAsText(file);
        });

        // ================= 7. 全局事件绑定与初始化 =================
        
        btnAddWord.addEventListener('click', openModal);
        btnCancelModal.addEventListener('click', closeModal);
        wordModal.addEventListener('click', (e) => { 
            if (e.target === wordModal) closeModal(); 
        });

        // 初始化渲染
        renderAlphabetIndex();
        handleSearch();
    });
    </script>
</body>
</html>
