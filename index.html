<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词积累本</title>
    <style>
        /* ================= 基础变量与重置 (精准 Claude 风格还原) ================= */
        :root {
            /* 核心：Claude 标志性的暖米色画布 */
            --bg-color: #F3F1EC;
            /* 卡片背景：通常为纯白或极浅的暖白 */
            --card-bg: #FFFFFF;
            /* 字体颜色：深邃的暖黑/炭棕色，而非纯黑 */
            --text-main: #1A1919;
            --text-muted: #66645E;
            /* 核心：Claude 标志性的铁锈红/陶土橘主按钮 */
            --primary-color: #D95C37;
            --primary-hover: #C24F2E;
            /* 极浅的温和边框 */
            --border-color: #E2DFD8;
            /* 弥散的呼吸感阴影 */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.02);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.08);
            /* 显著的大圆角 */
            --border-radius: 16px;
            --transition-speed: 0.2s;

            /* 字体栈分离：衬线体负责标题/核心词汇，无衬线体负责正文/UI控件 */
            --font-serif: "Tiina", "Tiempos Text", "Georgia", "Times New Roman", serif;
            --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ================= 布局组件 ================= */
        .header {
            background-color: transparent; /* 融入画布背景 */
            padding: 2rem 2rem 1rem;
            box-shadow: none;
            text-align: center; /* 居中以体现古典版式美感 */
        }

        .header h1 {
            font-family: var(--font-serif);
            font-size: 2.2rem;
            color: var(--text-main);
            font-weight: 500;
            letter-spacing: -0.02em;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 1rem 4rem;
        }

        /* ================= 控制区 ================= */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 3rem;
            align-items: center;
            justify-content: center; /* 居中对齐控制区，契合原图表单居中风格 */
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            max-width: 500px;
        }

        .search-box input {
            width: 100%;
            padding: 0.85rem 1.2rem;
            background-color: #FAFAFA;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: var(--font-sans);
            font-size: 0.95rem;
            color: var(--text-main);
            outline: none;
            transition: all var(--transition-speed) ease;
        }

        .search-box input:focus {
            background-color: #FFFFFF;
            border-color: var(--text-muted);
            box-shadow: 0 0 0 1px var(--text-muted);
        }

        .search-box input::placeholder {
            color: #A3A19A;
        }

        .action-buttons {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        /* ================= 按钮样式 ================= */
        .btn {
            padding: 0.85rem 1.25rem;
            border: 1px solid var(--border-color);
            background-color: #FFFFFF;
            color: var(--text-main);
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--font-sans);
            font-size: 0.9rem;
            font-weight: 500;
            transition: all var(--transition-speed) ease;
            display: inline-block;
        }

        .btn:hover {
            background-color: #F8F7F4;
            border-color: #D2D0C9;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: #ffffff;
            border-color: var(--primary-color);
            box-shadow: 0 2px 4px rgba(217, 92, 55, 0.2); /* 匹配陶土橘的专属阴影 */
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
            box-shadow: 0 4px 8px rgba(217, 92, 55, 0.3);
        }

        /* ================= 可访问性与辅助样式 ================= */
        .file-upload-input {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .required-mark {
            color: var(--primary-color);
            margin-left: 4px;
        }

        /* ================= 单词列表区 ================= */
        .word-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .word-card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 2rem;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            transition: box-shadow var(--transition-speed), transform var(--transition-speed);
        }

        .word-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .word-card-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1.2rem;
        }

        .word-card-word {
            /* 赋予单词核心的衬线体质感 */
            font-family: var(--font-serif);
            font-size: 1.8rem;
            font-weight: 500;
            color: var(--text-main);
            letter-spacing: -0.02em;
        }

        .word-card-phonetic {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-family: var(--font-sans);
            margin-left: 0.75rem;
            font-weight: 400;
        }

        .word-card-pos {
            display: inline-block;
            background-color: var(--bg-color); /* 使用底色燕麦色作为小标签背景 */
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.8rem;
            border: 1px solid var(--border-color);
        }

        .word-card-translation {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .word-card-usage {
            font-family: var(--font-serif); /* 例句也使用衬线体，增强阅读的沉浸感 */
            font-size: 1.05rem;
            color: var(--text-muted);
            line-height: 1.6;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }

        /* 卡片内部操作按钮 */
        .card-actions button {
            font-family: var(--font-sans);
            font-weight: 500;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        /* ================= 弹窗 (Modal) ================= */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(26, 25, 25, 0.4); /* 更深的遮罩，突出内容 */
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg-color); /* 弹窗背景使用燕麦色 */
            width: 90%;
            max-width: 480px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            animation: modalFadeIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal-header {
            padding: 2rem 2rem 1rem;
            text-align: center;
        }

        .modal-header h2 {
            font-family: var(--font-serif);
            font-size: 1.5rem;
            color: var(--text-main);
            font-weight: 500;
        }

        .modal-body {
            padding: 0 2rem 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-main);
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: var(--font-sans);
            font-size: 0.95rem;
            color: var(--text-main);
            background-color: #FFFFFF;
            outline: none;
            transition: all var(--transition-speed) ease;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            border-color: var(--text-muted);
            box-shadow: 0 0 0 1px var(--text-muted);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .modal-footer {
            padding: 1rem 2rem 2rem;
            display: flex;
            justify-content: stretch;
            gap: 1rem;
        }
        
        .modal-footer button {
            flex: 1;
        }

        /* ================= 侧边字母表样式与布局重构 ================= */
        .layout-wrapper {
            display: flex;
            gap: 2.5rem;
            align-items: flex-start;
        }

        .main-content {
            flex: 1;
            min-width: 0;
        }

        .alphabet-sidebar {
            width: 54px;
            position: sticky;
            top: 40px;
            background-color: transparent;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .alpha-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-family: var(--font-sans);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-speed) ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .alpha-btn:not(.disabled):hover {
            background-color: var(--border-color);
            color: var(--text-main);
        }

        .alpha-btn.active {
            background-color: var(--text-main);
            color: #FFFFFF;
        }

        .alpha-btn.disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .alpha-btn.all-btn {
            font-size: 0.75rem;
            width: 42px;
            border-radius: 8px;
            margin-bottom: 1rem;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
        }

        /* ================= 移动端适配 ================= */
        @media (max-width: 768px) {
            .header {
                padding: 1.5rem 1rem 0.5rem;
            }
            .controls {
                flex-direction: column;
                align-items: stretch;
                padding: 1rem;
            }
            .action-buttons {
                justify-content: space-between;
            }
            .action-buttons .btn,
            .action-buttons label {
                flex: 1;
                text-align: center;
            }
            .layout-wrapper {
                flex-direction: column;
            }
            .alphabet-sidebar {
                width: 100%;
                position: static;
                flex-direction: row;
                overflow-x: auto;
                padding: 0 0 1rem 0;
                margin-bottom: 0;
            }
            .alpha-btn {
                flex-shrink: 0;
            }
            .alpha-btn.all-btn {
                margin-bottom: 0;
                margin-right: 0.5rem;
            }
        }
        
        /* ================= 艺术背景底纹 ================= */
body::before {
    content: "过！";
    position: fixed;
    top: 50%;
    left: 50%;
    /* 居中并旋转，增加艺术动感 */
    transform: translate(-50%, -50%) rotate(-12deg);
    /* 使用 50% 的屏幕宽度，确保字足够大 */
    font-size: 50vw; 
    font-family: var(--font-serif); /* 沿用 Claude 的衬线体 */
    font-weight: 700;
    /* 使用你要求的铁锈红/陶土橘 */
    color: #D95C37; 
    /* 极低透明度，确保不干扰正文阅读 */
    opacity: 0.04; 
    z-index: -1; /* 置于最底层 */
    pointer-events: none; /* 确保文字不阻碍鼠标点击操作 */
    user-select: none; /* 防止用户误选背景文字 */
    white-space: nowrap;
}
    </style>
</head>
<body>

    <header class="header">
        <h1>单词积累本</h1>
    </header>

    <main class="container layout-wrapper">
        <div class="main-content">
            <div class="controls">
                <div class="search-box">
                    <input type="text" id="searchInput" aria-label="搜索单词" placeholder="搜索单词、翻译或拼写...">
                </div>
                <div class="action-buttons">
                    <button type="button" id="btnAddWord" class="btn btn-primary">添加单词</button>
                    <button type="button" id="btnExportData" class="btn">导出数据</button>
                    <label for="importFile" class="btn">导入数据</label>
                    <input type="file" id="importFile" class="file-upload-input" accept=".json">
                </div>
            </div>

            <div id="wordList" class="word-list">
            </div>
        </div>

        <aside class="alphabet-sidebar" aria-label="字母导航">
            <div id="alphabetList" style="display: contents;">
            </div>
        </aside>
    </main>

    <div id="wordModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">添加单词</h2>
            </div>
            <div class="modal-body">
                <form id="wordForm">
                    <input type="hidden" id="wordId">
                    <div class="form-group">
                        <label for="wordInput">单词 <span class="required-mark">*</span></label>
                        <input type="text" id="wordInput" required placeholder="例如: Apple">
                    </div>
                    <div class="form-group">
                        <label for="phoneticInput">音标</label>
                        <input type="text" id="phoneticInput" placeholder="例如: /ˈæp.əl/">
                    </div>
                    <div class="form-group">
                        <label for="posInput">词性</label>
                        <input type="text" id="posInput" placeholder="例如: n. / adj. / v.">
                    </div>
                    <div class="form-group">
                        <label for="translationInput">中文翻译</label>
                        <input type="text" id="translationInput" placeholder="例如: 苹果">
                    </div>
                    <div class="form-group">
                        <label for="usageInput">例句或用法说明</label>
                        <textarea id="usageInput" placeholder="输入例句或短语搭配..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" id="btnCancelModal" class="btn">取消</button>
                <button type="submit" form="wordForm" id="btnSaveWord" class="btn btn-primary">保存</button>
            </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // ================= 1. DOM 节点获取 =================
        const wordListEl = document.getElementById('wordList');
        const btnAddWord = document.getElementById('btnAddWord');
        const wordModal = document.getElementById('wordModal');
        const btnCancelModal = document.getElementById('btnCancelModal');
        const wordForm = document.getElementById('wordForm');
        
        const searchInput = document.getElementById('searchInput');
        const btnExportData = document.getElementById('btnExportData');
        const importFile = document.getElementById('importFile');
        const alphabetListEl = document.getElementById('alphabetList');

        // ================= 2. 状态管理 =================
        let vocabulary = JSON.parse(localStorage.getItem('my_vocabulary')) || [];
        let currentLetterFilter = 'All';

        // ================= 3. 基础工具函数 =================
        const escapeHTML = (str) => {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        };

        const saveToLocal = () => {
            localStorage.setItem('my_vocabulary', JSON.stringify(vocabulary));
            renderAlphabetIndex(); 
        };

        // ================= 4. 视图渲染逻辑 =================
        
        const renderList = (dataToRender = vocabulary) => {
            wordListEl.innerHTML = '';

            // 空状态 (Empty State) 拦截渲染
            if (dataToRender.length === 0) {
                wordListEl.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 4rem 1rem; color: var(--text-muted);">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" style="margin-bottom: 1rem; opacity: 0.6; display: inline-block;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" />
                        </svg>
                        <p style="font-family: var(--font-serif); font-size: 1.25rem; font-weight: 500; color: var(--text-main);">未找到单词</p>
                        <p style="font-size: 0.95rem; margin-top: 0.5rem;">请更换搜索条件，或添加新的词汇储备。</p>
                    </div>
                `;
                return;
            }

            const sortedVocab = [...dataToRender].sort((a, b) => 
                a.word.toLowerCase().localeCompare(b.word.toLowerCase())
            );

            sortedVocab.forEach(item => {
                const card = document.createElement('div');
                card.className = 'word-card';
                
                let cardHTML = `
                    <div class="word-card-header">
                        <div>
                            <span class="word-card-word">${escapeHTML(item.word)}</span>
                            <span class="word-card-phonetic">${escapeHTML(item.phonetic)}</span>
                        </div>
                        <div class="card-actions" style="display:flex; gap:1rem;">
                            <button class="btn-edit" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size: 0.75rem; transition:color 0.2s;">编辑</button>
                            <button class="btn-delete" style="background:none; border:none; color:var(--primary-color); cursor:pointer; font-size: 0.75rem; transition:color 0.2s;">删除</button>
                        </div>
                    </div>
                `;
                
                if (item.partOfSpeech) cardHTML += `<div class="word-card-pos">${escapeHTML(item.partOfSpeech)}</div>`;
                if (item.translation) cardHTML += `<div class="word-card-translation">${escapeHTML(item.translation)}</div>`;
                if (item.usage) cardHTML += `<div class="word-card-usage">${escapeHTML(item.usage)}</div>`;

                card.innerHTML = cardHTML;

                // 悬停交互增强
                const editBtn = card.querySelector('.btn-edit');
                const delBtn = card.querySelector('.btn-delete');
                editBtn.addEventListener('mouseenter', () => editBtn.style.color = 'var(--text-main)');
                editBtn.addEventListener('mouseleave', () => editBtn.style.color = 'var(--text-muted)');
                delBtn.addEventListener('mouseenter', () => delBtn.style.color = 'var(--primary-hover)');
                delBtn.addEventListener('mouseleave', () => delBtn.style.color = 'var(--primary-color)');

                editBtn.addEventListener('click', () => editWord(item.id));
                delBtn.addEventListener('click', () => deleteWord(item.id));

                wordListEl.appendChild(card);
            });
        };

        const renderAlphabetIndex = () => {
            alphabetListEl.innerHTML = '';
            
            const existingLetters = new Set(vocabulary.map(v => v.word.charAt(0).toUpperCase()));

            const btnAll = document.createElement('button');
            btnAll.className = `alpha-btn all-btn ${currentLetterFilter === 'All' ? 'active' : ''}`;
            btnAll.textContent = 'ALL';
            btnAll.addEventListener('click', () => {
                currentLetterFilter = 'All';
                handleSearch(); 
                renderAlphabetIndex(); 
            });
            alphabetListEl.appendChild(btnAll);

            for (let i = 65; i <= 90; i++) {
                const letter = String.fromCharCode(i);
                const hasWords = existingLetters.has(letter);
                const isActive = currentLetterFilter === letter;

                const btn = document.createElement('button');
                btn.className = `alpha-btn ${!hasWords ? 'disabled' : ''} ${isActive ? 'active' : ''}`;
                btn.textContent = letter;

                if (hasWords) {
                    btn.addEventListener('click', () => {
                        currentLetterFilter = letter;
                        handleSearch();
                        renderAlphabetIndex();
                    });
                }
                alphabetListEl.appendChild(btn);
            }
        };

        // ================= 5. 交互与增删改查逻辑 =================

        const handleSearch = () => {
            const keyword = searchInput.value.trim().toLowerCase();
            let filteredData = vocabulary;

            // 1. 字母过滤
            if (currentLetterFilter !== 'All') {
                filteredData = filteredData.filter(item => 
                    item.word.charAt(0).toUpperCase() === currentLetterFilter
                );
            }

            // 2. 关键字搜索过滤
            if (keyword) {
                filteredData = filteredData.filter(item => 
                    item.word.toLowerCase().includes(keyword) || 
                    (item.translation && item.translation.includes(keyword))
                );
            }

            renderList(filteredData);
        };
        searchInput.addEventListener('input', handleSearch);

        const deleteWord = (id) => {
            if (window.confirm('此操作不可逆，确定要删除这个单词吗？')) {
                vocabulary = vocabulary.filter(item => item.id !== id);
                saveToLocal();
                
                // 删除后如果该字母分类已空，重置回 All 状态
                const existingLetters = new Set(vocabulary.map(v => v.word.charAt(0).toUpperCase()));
                if (currentLetterFilter !== 'All' && !existingLetters.has(currentLetterFilter)) {
                    currentLetterFilter = 'All';
                }
                handleSearch(); 
            }
        };

        const openModal = () => {
            document.getElementById('modalTitle').textContent = '添加单词';
            wordModal.classList.add('active');
        };
        
        const closeModal = () => {
            wordModal.classList.remove('active');
            wordForm.reset(); 
            document.getElementById('wordId').value = ''; 
        };
        
        const editWord = (id) => {
            const item = vocabulary.find(v => v.id === id);
            if (!item) return;
            document.getElementById('wordId').value = item.id;
            document.getElementById('wordInput').value = item.word;
            document.getElementById('phoneticInput').value = item.phonetic || '';
            document.getElementById('posInput').value = item.partOfSpeech || '';
            document.getElementById('translationInput').value = item.translation || '';
            document.getElementById('usageInput').value = item.usage || '';
            document.getElementById('modalTitle').textContent = '编辑单词';
            wordModal.classList.add('active');
        };

        wordForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const wordInputValue = document.getElementById('wordInput').value.trim();
            
            // 正则校验防线：仅允许英文字母、空格和连字符
            const wordRegex = /^[A-Za-z\s\-]+$/;
            if (!wordRegex.test(wordInputValue)) {
                alert('添加失败：\n单词只能包含英文字母、空格或连字符（-）！\n严禁输入中文、数字或其他特殊符号。');
                return;
            }

            const editId = document.getElementById('wordId').value;
            const newWordData = {
                word: wordInputValue,
                phonetic: document.getElementById('phoneticInput').value.trim(),
                partOfSpeech: document.getElementById('posInput').value.trim(),
                translation: document.getElementById('translationInput').value.trim(),
                usage: document.getElementById('usageInput').value.trim(),
            };

            if (editId) {
                const index = vocabulary.findIndex(v => v.id === editId);
                if (index > -1) vocabulary[index] = { ...vocabulary[index], ...newWordData };
            } else {
                vocabulary.push({
                    id: Date.now().toString(),
                    timestamp: Date.now(),
                    ...newWordData
                });
            }

            saveToLocal();
            handleSearch(); 
            closeModal();
        });

        // ================= 6. 跨端同步 (导入/导出) =================
        
        btnExportData.addEventListener('click', () => {
            if (vocabulary.length === 0) return alert('存储库为空，没有可导出的数据！');
            const dataStr = JSON.stringify(vocabulary, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'my_vocabulary.json';
            document.body.appendChild(a); 
            a.click(); 
            document.body.removeChild(a); 
            URL.revokeObjectURL(url);
        });

        importFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const importedData = JSON.parse(event.target.result);
                    if (!Array.isArray(importedData)) throw new Error('非法格式：顶级结构必须是数组。');

                    let mergedCount = 0;
                    let updatedCount = 0;

                    importedData.forEach(newWord => {
                        if (!newWord.word) return;
                        const existingIndex = vocabulary.findIndex(v => 
                            v.id === newWord.id || 
                            v.word.toLowerCase() === newWord.word.toLowerCase()
                        );

                        if (existingIndex > -1) {
                            vocabulary[existingIndex] = { ...vocabulary[existingIndex], ...newWord, id: vocabulary[existingIndex].id };
                            updatedCount++;
                        } else {
                            if (!newWord.id) newWord.id = Date.now().toString() + Math.random().toString(36).substring(2);
                            if (!newWord.timestamp) newWord.timestamp = Date.now();
                            vocabulary.push(newWord);
                            mergedCount++;
                        }
                    });

                    saveToLocal();
                    handleSearch();
                    alert(`导入成功！\n- 新增单词: ${mergedCount} 个\n- 更新已有单词: ${updatedCount} 个`);
                } catch (error) { 
                    alert('解析失败，请检查文件是否损坏。\n系统错误：' + error.message); 
                } finally { 
                    e.target.value = ''; 
                }
            };
            reader.readAsText(file);
        });

        // ================= 7. 全局事件绑定与初始化 =================
        
        btnAddWord.addEventListener('click', openModal);
        btnCancelModal.addEventListener('click', closeModal);
        wordModal.addEventListener('click', (e) => { 
            if (e.target === wordModal) closeModal(); 
        });

        // 初始化渲染
        renderAlphabetIndex();
        handleSearch();
    });
    </script>
</body>
</html>
